name: splitly

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-splitly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-splitly}
      POSTGRES_DB: ${POSTGRES_DB:-splitly}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - splitly_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-splitly}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  splitly_db_data:
